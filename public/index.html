<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultraviolet Browser</title>
    <style>
        :root {
            --bg-dark: #202124;
            --toolbar-bg: #35363a;
            --accent-blue: #8ab4f8;
            --text-main: #e8eaed;
            --tab-inactive: #292a2d;
            --error-red: #f28b82;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; margin: 0;
            background: var(--bg-dark); color: var(--text-main);
            overflow: hidden;
        }
        .browser-header { background: var(--toolbar-bg); padding: 8px 8px 0; z-index: 100; }
        .tabs-container { display: flex; align-items: center; gap: 4px; overflow-x: auto; }
        .tab {
            background: var(--tab-inactive); padding: 8px 16px; border-radius: 8px 8px 0 0;
            font-size: 13px; min-width: 120px; max-width: 180px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; border-bottom: 2px solid transparent;
        }
        .tab.active { background: var(--bg-dark); border-bottom: 2px solid var(--accent-blue); }
        .tab-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .close-tab { margin-left: 8px; font-size: 10px; cursor: pointer; padding: 2px 5px; border-radius: 50%; }
        .close-tab:hover { background: rgba(255,255,255,0.2); }
        .add-tab-btn { padding: 8px 12px; cursor: pointer; color: var(--accent-blue); font-size: 20px; }
        .toolbar { background: var(--bg-dark); display: flex; padding: 8px 12px; gap: 12px; }
        .address-container { flex: 1; position: relative; }
        input#urlInput {
            width: 100%; padding: 8px 16px; background: var(--toolbar-bg);
            border: 1px solid transparent; border-radius: 20px; color: white; outline: none;
        }
        input#urlInput:focus { border-color: var(--accent-blue); }
        .loading-bar { height: 2px; width: 0%; background: var(--accent-blue); position: absolute; bottom: -4px; transition: width 0.3s; }
        #contentContainer { flex: 1; background: white; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }
        #toast {
            position: fixed; bottom: 20px; right: -400px; background: #323232;
            padding: 16px; border-radius: 8px; border-left: 4px solid var(--error-red);
            transition: right 0.4s; z-index: 1000;
        }
        #toast.show { right: 20px; }
    </style>
</head>
<body>
    <div id="toast"><span id="toastMsg"></span></div>
    <div class="browser-header">
        <div class="tabs-container" id="tabsList">
            <div class="add-tab-btn" onclick="createNewTab()">+</div>
        </div>
        <div class="toolbar">
            <div class="address-container">
                <input type="text" id="urlInput" placeholder="検索またはURLを入力">
                <div class="loading-bar" id="loadBar"></div>
            </div>
        </div>
    </div>
    <div id="contentContainer"></div>

    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    <script>
        let tabs = [];
        let activeTabId = null;
        let isWorkerReady = false;

        async function createNewTab(url = "") {
            const id = Date.now();
            const newTab = { id, url, title: "New Tab" };
            tabs.push(newTab);
            const iframe = document.createElement('iframe');
            iframe.id = `frame-${id}`;
            document.getElementById('contentContainer').appendChild(iframe);
            renderTabs();
            switchTab(id);
        }

        function renderTabs() {
            const list = document.getElementById('tabsList');
            const addBtn = list.querySelector('.add-tab-btn');
            list.querySelectorAll('.tab').forEach(t => t.remove());
            tabs.forEach(tab => {
                const el = document.createElement('div');
                el.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
                el.onclick = () => switchTab(tab.id);
                el.innerHTML = `<span class="tab-title">${tab.title}</span><span class="close-tab" onclick="closeTab(event, ${tab.id})">✕</span>`;
                list.insertBefore(el, addBtn);
            });
        }

        function switchTab(id) {
            activeTabId = id;
            const tab = tabs.find(t => t.id === id);
            document.getElementById('urlInput').value = (tab.url || "");
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
            document.getElementById(`frame-${id}`).classList.add('active');
            renderTabs();
        }

        function closeTab(e, id) {
            e.stopPropagation();
            if (tabs.length === 1) return;
            tabs = tabs.filter(t => t.id !== id);
            document.getElementById(`frame-${id}`).remove();
            if (activeTabId === id) switchTab(tabs[0].id);
            else renderTabs();
        }

        async function navigate() {
            if (!isWorkerReady) return showToast("準備中...");
            const input = document.getElementById('urlInput').value.trim();
            if (!input) return;

            let url = input;
            if (!/^https?:\/\//i.test(url)) {
                url = (url.includes('.') && !url.includes(' ')) ? 'https://' + url : 'https://www.google.com/search?q=' + encodeURIComponent(url);
            }

            const tab = tabs.find(t => t.id === activeTabId);
            tab.url = url;
            const frame = document.getElementById(`frame-${activeTabId}`);
            const loadBar = document.getElementById('loadBar');
            
            loadBar.style.width = "50%";
            frame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
            frame.onload = () => {
                tab.title = new URL(url).hostname;
                loadBar.style.width = "100%";
                setTimeout(() => loadBar.style.width = "0%", 400);
                renderTabs();
            };
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        document.getElementById('urlInput').addEventListener('keypress', e => { if(e.key==='Enter') navigate(); });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./uv/uv.sw.js', { scope: __uv$config.prefix }).then(() => {
                isWorkerReady = true;
                createNewTab();
            });
        }
    </script>
</body>
</html>

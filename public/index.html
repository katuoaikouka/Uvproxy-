<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lite Proxy</title>
    <style>
        body { font-family: sans-serif; margin: 0; overflow: hidden; background: #222; color: white; }
        .nav { height: 50px; display: flex; align-items: center; padding: 0 20px; background: #333; }
        input { flex: 1; padding: 8px; border-radius: 4px; border: none; margin-right: 10px; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        iframe { width: 100%; height: calc(100vh - 50px); border: none; background: white; }
    </style>
</head>
<body>
    <div class="nav">
        <form id="idk" style="display: flex; width: 100%;">
            <input type="text" id="url" placeholder="検索またはURLを入力 (DuckDuckGo)" required>
            <button type="submit">移動</button>
        </form>
    </div>
    <iframe id="iframe"></iframe>

    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    <script src="index.js"></script>
</body>
</html>
